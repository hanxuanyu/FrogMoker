spring:
  application:
    name: FrogMoker
  datasource:
    url: jdbc:sqlite:data/db/frogmoker.db
    driver-class-name: org.sqlite.JDBC

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

frogmoker:
  storage:
    root: data

server:
  port: 8080
